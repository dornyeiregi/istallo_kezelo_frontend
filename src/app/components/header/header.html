<nav class="navbar">
  <div class="nav-left">
    <a
      routerLink="/"
      class="brand"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      StableManager
    </a>

    <!-- Navigáció, ha be van jelentkezve -->
    <ng-container *ngIf="isAuthenticated$ | async">
      <!-- <a routerLink="/" routerLinkActive="active">Kezdőlap</a> -->
      <!-- <a routerLink="/stables" routerLinkActive="active">Istállók</a>
      <a routerLink="/horses" routerLinkActive="active">Lovak</a> -->
    </ng-container>
  </div>

  <div class="nav-right">
    <!-- Felhasználónév + kijelentkezés -->
    <ng-container *ngIf="user$ | async as user; else guest">
      <a class="user-chip" routerLink="/settings" routerLinkActive="active">
        {{ user.username }}
      </a>
      <button type="button" class="logout-button" (click)="logout()">Kijelentkezés</button>
    </ng-container>

    <!-- Vendégnézet -->
    <ng-template #guest>
      <a routerLink="/login" class="login-link" routerLinkActive="active"> Bejelentkezés </a>
    </ng-template>
  </div>
</nav>
