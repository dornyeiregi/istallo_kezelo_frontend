<div class="login-layout">
  <section class="showcase">
    <div class="overlay">
      <h1>StableManager</h1>
      <p>Adminisztráld az istállóidat, a lovakat és a napi üzemeltetési feladatokat egy helyen.</p>
    </div>
  </section>

  <section class="form-panel">
    <div class="form-wrapper">
      <h2>Bejelentkezés</h2>
      <p class="subtitle">Jelentkezz be a rendszergazdai felület eléréséhez.</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <label class="field">
          <span class="field-label">Felhasználónév</span>
          <input
            type="text"
            formControlName="username"
            placeholder="pl. admin"
            autocomplete="username"
          />
          <span class="field-error" *ngIf="usernameInvalid">Kötelező mező.</span>
        </label>

        <label class="field">
          <span class="field-label">Jelszó</span>
          <input
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <span class="field-error" *ngIf="passwordInvalid">Kötelező mező.</span>
        </label>

        <div class="error" *ngIf="error">{{ error }}</div>

        <button type="submit" [disabled]="loading">
          <ng-container *ngIf="loading; else loginBtn">
            <span class="spinner"></span> Bejelentkezés folyamatban...
          </ng-container>
          <ng-template #loginBtn>
            <i class="fa-solid fa-lock-open" aria-hidden="true"></i>
            Bejelentkezés
          </ng-template>
        </button>
      </form>

      <div class="access-note">
        Új felhasználót csak adminisztrátor tud hozzáadni. Hozzáférés igényléséhez keresd az
        adminisztrátort.
      </div>
    </div>
  </section>
</div>
