<div class="form-container">
  <nav class="breadcrumb">
    <a (click)="goBack()" class="back-link">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Vissza a tárolókhoz
    </a>
  </nav>

  <h1>Új tétel és tároló hozzáadása</h1>

  @if (error) {
    <div class="error">{{ error }}</div>
  }

  @if (success) {
    <div class="success-msg">
      Tétel és tároló sikeresen létrehozva!
    </div>
  }

  <form (ngSubmit)="onSubmit()" #itemForm="ngForm" novalidate>
    <div class="form-group">
      <label for="name">Tétel neve *</label>
      <input
        id="name"
        name="name"
        type="text"
        [(ngModel)]="form.name"
        required
      />
    </div>


    <div class="form-group">
      <label for="itemCategory">Kategória *</label>
      <select
        id="itemCategory"
        name="itemCategory"
        [(ngModel)]="form.itemCategory"
        (change)="onCategoryChange()"
        required
      >
        <option value="" disabled selected>Válassz kategóriát</option>
        @for (cat of itemCategories; track cat) {
          <option [ngValue]="cat">{{ itemCategoryLabels[cat] }}</option>
        }
      </select>
    </div>


    <div class="form-group">
      <label for="itemType">Típus *</label>
      <select
        id="itemType"
        name="itemType"
        [(ngModel)]="form.itemType"
        required
      >
        <option value="" disabled selected>Válassz típust</option>
        @for (type of filteredItemTypes; track type) {
          <option [ngValue]="type">{{ itemTypeLabels[type] }}</option>
        }
      </select>
    </div>


    <div class="form-group">
      <label for="feedUnitAmount">
        Etetési adag (kg) *
        <span
          class="hint-icon"
          data-tooltip="Egy etetéshez felhasznált mennyiség. Pl. 1 kg/adag."
          aria-label="Etetési adag súgó"
        >?</span>
      </label>
      <input
        id="feedUnitAmount"
        name="feedUnitAmount"
        type="number"
        min="0.01"
        step="0.01"
        [(ngModel)]="form.feedUnitAmount"
        required
      />
    </div>

    <div class="form-group">
      <label>
        Tároló mennyiség *
        <span
          class="hint-icon"
          data-tooltip="Add meg a darabszámot és az egy egység (zsák) súlyát. Összesen = darab × zsák (kg)."
          aria-label="Tároló mennyiség súgó"
        >?</span>
      </label>
      <div class="inline-group">
        <input
          id="packageCount"
          name="packageCount"
          type="number"
          min="0"
          step="1"
          placeholder="Darab"
          [(ngModel)]="form.packageCount"
          required
        />
        <input
          id="packageSize"
          name="packageSize"
          type="number"
          min="0"
          step="0.1"
          placeholder="Egy zsák (kg)"
          [(ngModel)]="form.packageSize"
          required
        />
      </div>
      <div class="hint">Összesen: {{ totalStored | number:'1.0-2' }} kg</div>
    </div>

    <button
      type="submit"
      class="submit-button"
      [disabled]="loading || !itemForm.form.valid"
    >
      <i class="fa-solid fa-circle-plus" aria-hidden="true"></i>
      Létrehozás
    </button>

    @if (loading) {
      <div class="info">Mentés folyamatban...</div>
    }
  </form>
</div>
