<div class="form-container">
  <nav class="breadcrumb">
    <a (click)="goBack()" class="back-link">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Vissza
    </a>
  </nav>

  <h1>Oltás szerkesztése</h1>

  @if (loading) {
    <div class="info">Betöltés...</div>
  } @else if (error) {
    <div class="error">{{ error }}</div>
  } @else {
    @if (success) {
      <div class="success-msg">Oltás sikeresen frissítve!</div>
    }

    <form (ngSubmit)="onSubmit()" #shotForm="ngForm">
      <div class="form-group">
        <label>Oltás neve *</label>
        <input type="text" name="shotName" [(ngModel)]="form.shotName" required />
      </div>

      <div class="form-group">
        <label>Dátum *</label>
        <input type="date" name="date" [(ngModel)]="form.date" required />
      </div>

      <div class="form-group">
        <label>Gyakoriság (érték)</label>
        <input type="number" name="frequencyValue" [(ngModel)]="form.frequencyValue" />
      </div>

      <div class="form-group">
        <label>Gyakoriság (egység)</label>
        <select name="frequencyUnit" [(ngModel)]="form.frequencyUnit">
          <option value="" disabled>Válassz egységet</option>
          @for (unit of frequencyUnits; track unit) {
            <option [ngValue]="unit">{{ frequencyLabels[unit] }}</option>
          }
        </select>
      </div>

      <div class="form-group horse-list">
        <label>Lovak hozzárendelése az oltáshoz</label>

        @if (horses.length === 0) {
          <p>Nincs elérhető ló.</p>
        } @else {
          @for (horse of horses; track horse.id) {
            <label class="horse-row" [attr.data-key]="horse.id">
              <input
                type="checkbox"
                [checked]="selectedHorseIds.has(toNumber(horse.id!))"
                (change)="toggleHorseSelection(toNumber(horse.id!))"
              />
              {{ horse.horseName }}
            </label>
          }
        }
      </div>

      <button type="submit" class="submit-button" [disabled]="loading || !shotForm.form.valid">
        <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
        Mentés
      </button>

      @if (loading) {
        <div class="info">Mentés folyamatban...</div>
      }
    </form>
  }
</div>
