services:
  db:
    image: postgres:16-alpine
    container_name: istallo-kezelo-db
    environment:
      POSTGRES_DB: istallo_kezelo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d istallo_kezelo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../istallo_kezelo
      dockerfile: Dockerfile
    container_name: istallo-kezelo-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/istallo_kezelo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://127.0.0.1:4200,http://${APP_HOST_IP}:4200"
      JWT_SECRET: ${JWT_SECRET}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_MAIL_TO: ${APP_MAIL_TO:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "${BACKEND_BIND_HOST:-0.0.0.0}:8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NG_BUILD_CONFIG: production
    container_name: istallo-kezelo-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND_HOST:-0.0.0.0}:4200:80"

volumes:
  postgres_data:
